<!DOCTYPE html>
<html>

<head>
  <title>Black-Owned & Found</title>

  <style>
    body {
      background-color: rgb(127, 65, 2);
      margin: 0;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: black;
      padding: 15px 40px;
    }

    nav h1 {
      color: yellow;
      margin: 0;
    }

    nav ul {
      color: yellow;
      align-items: center;
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
    }

    nav input {
      padding: 8px;
      width: 350px;
      border-radius: 5px;
      border: none;
    }

    nav a {
      color: yellow;
      text-decoration: none;
    }

    nav ul a {
      color: yellow;
    }

    nav a:hover {
      text-decoration: underline;
    }

    #add-business {
      margin-top: 80px;
      text-align: center;
      color: yellow;
    }

    #add-business h2 {
      color: yellow;
    }

    #add-business label {
      color: yellow;
    }

    #add-business input {
      padding: 8px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }

    #add-business button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background-color: black;
      color: yellow;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <nav>
    <h1><a href="index.html">Black-Owned & Found</a></h1>

    <input type="text" placeholder="Search businesses">

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="#">Businesses</a></li>
      <li><a href="add-business.html">Add Business</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <section id="add-business">
    <h2>Add a Business</h2>

    <form id="businessForm">
      <label for="name">Business Name:</label><br>
      <input type="text" id="name" name="name" required><br><br>

      <label for="category">Category:</label><br>
      <input type="text" id="category" name="category" required><br><br>

      <label for="city">City:</label><br>
      <input type="text" id="city" name="city" required><br><br>

      <button type="submit">Submit</button>
    </form>

    <p id="message"></p>
  </section>

</body>
</html>
