<!DOCTYPE html>
<html>

<head>
  <title>Black-Owned & Found</title>

  <style>
    body {
      background-color: rgb(127, 65, 2);
      margin: 0;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: black;
      padding: 15px 40px;
    }

    nav h1 {
      color: yellow;
      margin: 0;
    }

    nav ul {
      color: yellow;
      align-items: center;
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
    }

    nav input {
      padding: 8px;
      width: 350px;
      border-radius: 5px;
      border: none;
    }

    nav a {
      color: yellow;
      text-decoration: none;
    }

    nav ul a {
      color: yellow;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .signup-container {
      text-align: center;
      margin-top: 100px;
      color: yellow;
    }

    .signup-container input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }

    .signup-container button {
      padding: 10px 20px;
      border: none;
      background-color: black;
      color: yellow;
      border-radius: 5px;
      cursor: pointer;
    }

    .signup-container a {
      color: yellow;
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <nav>
    <h1><a href="index.html">Black-Owned & Found</a></h1>

    <input type="text" placeholder="Search businesses">

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="#">Businesses</a></li>
      <li><a href="add-business.html">Add Business</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <div class="signup-container">
    <h2>Create an Account</h2>

    <form id="loginForm">
      <label for="name">Email:</label><br>
      <input type="email" id="email" required><br><br>

      <label for="category">Password:</label><br>
      <input type="password" id="password" required><br><br>

      <button type="submit">Sign Up</button>
    </form>

    <p>
      Already have an account?
      <a href="login.html">Login</a>
    </p>

    <p id="message"></p>
  </div>

</body>
</html>
