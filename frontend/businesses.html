<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Businesses | Black-Owned & Found</title>

  <style>
    body {
      background-color: rgb(127, 65, 2);
      margin: 0;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: black;
      padding: 15px 40px;
      flex-wrap: wrap;
      gap: 20px;
    }

    nav h1 {
      color: yellow;
      margin: 0;
    }

    nav ul {
      color: yellow;
      align-items: center;
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
    }

    nav a {
      color: yellow;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 30px;
      background-color: black;
      border-radius: 10px;
      color: white;
    }

    h2 {
      color: yellow;
      margin-top: 0;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .filters input,
    .filters select,
    .filters button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    .filters button {
      background-color: yellow;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .filters button:hover {
      opacity: 0.9;
    }

    .business-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .business-card {
      background-color: rgb(30, 30, 30);
      border-radius: 10px;
      padding: 20px;
      border: 1px solid #444;
    }

    .business-card h3 {
      color: yellow;
      margin-top: 0;
    }

    .business-card p {
      margin: 8px 0;
      line-height: 1.5;
    }

    #message {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <nav>
    <h1><a href="index.html">Black-Owned & Found</a></h1>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="businesses.html">Businesses</a></li>
      <li><a href="add-business.html">Add Business</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

  <div class="container">
    <h2>Browse Businesses</h2>

    <div class="filters">
      <input type="text" id="nameInput" placeholder="Business name (optional)" />

      <select id="stateInput">
        <option value="">All States</option>
        <option value="Alabama">Alabama</option>
        <option value="Alaska">Alaska</option>
        <option value="Arizona">Arizona</option>
        <option value="Arkansas">Arkansas</option>
        <option value="California">California</option>
        <option value="Colorado">Colorado</option>
        <option value="Connecticut">Connecticut</option>
        <option value="Delaware">Delaware</option>
        <option value="Florida">Florida</option>
        <option value="Georgia">Georgia</option>
        <option value="Hawaii">Hawaii</option>
        <option value="Idaho">Idaho</option>
        <option value="Illinois">Illinois</option>
        <option value="Indiana">Indiana</option>
        <option value="Iowa">Iowa</option>
        <option value="Kansas">Kansas</option>
        <option value="Kentucky">Kentucky</option>
        <option value="Louisiana">Louisiana</option>
        <option value="Maine">Maine</option>
        <option value="Maryland">Maryland</option>
        <option value="Massachusetts">Massachusetts</option>
        <option value="Michigan">Michigan</option>
        <option value="Minnesota">Minnesota</option>
        <option value="Mississippi">Mississippi</option>
        <option value="Missouri">Missouri</option>
        <option value="Montana">Montana</option>
        <option value="Nebraska">Nebraska</option>
        <option value="Nevada">Nevada</option>
        <option value="New Hampshire">New Hampshire</option>
        <option value="New Jersey">New Jersey</option>
        <option value="New Mexico">New Mexico</option>
        <option value="New York">New York</option>
        <option value="North Carolina">North Carolina</option>
        <option value="North Dakota">North Dakota</option>
        <option value="Ohio">Ohio</option>
        <option value="Oklahoma">Oklahoma</option>
        <option value="Oregon">Oregon</option>
        <option value="Pennsylvania">Pennsylvania</option>
        <option value="Rhode Island">Rhode Island</option>
        <option value="South Carolina">South Carolina</option>
        <option value="South Dakota">South Dakota</option>
        <option value="Tennessee">Tennessee</option>
        <option value="Texas">Texas</option>
        <option value="Utah">Utah</option>
        <option value="Vermont">Vermont</option>
        <option value="Virginia">Virginia</option>
        <option value="Washington">Washington</option>
        <option value="West Virginia">West Virginia</option>
        <option value="Wisconsin">Wisconsin</option>
        <option value="Wyoming">Wyoming</option>
      </select>

      <input type="text" id="cityInput" placeholder="City (optional)" />

      <select id="category" name="category" required>
        <option value="">Category</option>

        <option value="Restaurant">Restaurant</option>
        <option value="Food Truck">Food Truck</option>
        <option value="Bakery & Desserts">Bakery & Desserts</option>

        <option value="Retail">Retail / Clothing</option>
        <option value="Beauty">Beauty (Hair, Nails, Barber)</option>
        <option value="Health">Health & Wellness</option>
        <option value="Fitness">Fitness / Gym</option>

        <option value="Technology">Technology</option>
        <option value="Professional Services">Professional Services</option>
        <option value="Automotive">Automotive</option>
        <option value="Education">Education / Tutoring</option>

        <option value="Entertainment">Entertainment</option>
        <option value="Real Estate">Real Estate</option>

        <option value="Other">Other</option>
      </select>

      <button id="searchBtn">Search</button>
    </div>

    <div id="businessList" class="business-list"></div>
    <p id="message"></p>
  </div>

  <script>
    const businessList = document.getElementById("businessList");
    const message = document.getElementById("message");
    const searchBtn = document.getElementById("searchBtn");

    async function loadBusinesses() {
      const name = document.getElementById("nameInput").value.trim();
      const state = document.getElementById("stateInput").value;
      const city = document.getElementById("cityInput").value.trim();
      const category = document.getElementById("category").value;

      const params = new URLSearchParams();

      if (name) params.append("q", name);   // 👈 important
      if (state) params.append("state", state);
      if (city) params.append("city", city);
      if (category) params.append("category", category);

      const url = `http://localhost:5001/businesses/search?${params.toString()}`;
      console.log(url);

      try {
        const response = await fetch(url);
        const businesses = await response.json();

        businessList.innerHTML = "";
        message.textContent = "";

        if (!businesses.length) {
          message.textContent = "No businesses found.";
          return;
        }

        businesses.forEach((business) => {
          const card = document.createElement("div");
          card.classList.add("business-card");

          card.innerHTML = `
            <h3>${business.name}</h3>
            <p><strong>Category:</strong> ${business.category}</p>
            <p><strong>Address:</strong> ${business.address || "No address listed."}</p>
            <p><strong>City:</strong> ${business.city}</p>
            <p><strong>State:</strong> ${business.state}</p>
            <p><strong>Description:</strong> ${business.description || "No description available."}</p>
            ${business.website ? `<p><a href="${business.website}" target="_blank">Visit Website</a></p>` : ""}
          `;

          businessList.appendChild(card);
        });
      } catch (error) {
        console.error("Error loading businesses:", error);
        message.textContent = "Could not load businesses.";
      }
    }

    searchBtn.addEventListener("click", loadBusinesses);
</script>

</body>
</html>
