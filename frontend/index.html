<!DOCTYPE html>

<html>
  <head>
  <title>Black-Owned & Found</title>

  <style>
    body{
      background-color: rgb(127, 65, 2);
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: black;
      padding: 15px 40px;
    }

    nav h1 {
      color: yellow;
      margin: 0;
    }

    nav ul {
      color: yellow;
      align-items: center;
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
    }
    
    nav input {
      padding: 8px;
      width: 350px;
      border-radius: 5px;
      border: none;
    }
    
    nav a {
      color: yellow;
      text-decoration: none;
    }

    nav ul a {
      color: yellow;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .hero {
      text-align: center;
      margin-top: 60px;
    }

    .hero h3 {
      color: yellow;
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      color: yellow;
      font-size: 18px;
    }

    #add-business {
  margin-top: 80px;
  text-align: center;
  color: yellow;
  }

  #add-business h2 {
    color: yellow;
  }

  #add-business label {
    color: yellow;
  }

  #add-business input {
    padding: 8px;
    width: 250px;
    border-radius: 5px;
    border: none;
  }

  #add-business button {
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    background-color: black;
    color: yellow;
    cursor: pointer;
  }

  </style>

  </head>

  <body>

    <nav>
      <h1><a href="index.html">Black-Owned & Found</a></h1>

      <input type="text" id="searchInput" placeholder="Search businesses">
      <button id="searchButton">Search</button>
      <div id="results"></div>

      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="businesses.html">Businesses</a></li>
        <li><a href="add-business.html">Add Business</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>

    <section class="hero">
      <h3>Discover Black-Owned Businesses Near You</h3>
      <p>Support Black entrepreneurs in your community.</p>
    </section>

    <script>
      async function searchBusinesses() {
      const searchValue = document.getElementById("searchInput").value.trim();

      if (!searchValue) {
        document.getElementById("results").innerHTML = "<p>Please enter a search.</p>";
        return;
      }

      try {
        const response = await fetch(
          `http://localhost:5001/businesses/search?q=${encodeURIComponent(searchValue)}`
        );

        const businesses = await response.json();

        const resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = "";

        if (businesses.length === 0) {
          resultsDiv.innerHTML = "<p>No businesses found.</p>";
          return;
        }

        businesses.forEach((business) => {
          const businessCard = document.createElement("div");
          businessCard.classList.add("business-card");

          businessCard.innerHTML = `
            <h3>${business.name}</h3>
            <p><strong>Category:</strong> ${business.category}</p>
            <p><strong>Location:</strong> ${business.city}, ${business.state}</p>
            <p>${business.description || ""}</p>
            <p>
              ${business.website ? `<a href="${business.website}" target="_blank">Visit Website</a>` : ""}
            </p>
            <hr>
          `;

          resultsDiv.appendChild(businessCard);
        });
      } catch (error) {
        console.error("Frontend search error:", error);
        document.getElementById("results").innerHTML = "<p>Error searching businesses.</p>";
      }
    }

    document.getElementById("searchButton").addEventListener("click", searchBusinesses);

    document.getElementById("searchInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        searchBusinesses();
      }
    });
  </script>

  </body>


</html>
